set -a terminal-features "tmux-256color:RGB"
set -g extended-keys on
set -g prefix C-SPACE
set -g base-index 1
set -g renumber-windows on   
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=black bg=white  "
set -g window-status-current-style "fg=colour255,bg=default,bold"
set -g window-status-separator ""
set -g window-status-format "#[fg=colour240]#[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour240]#[default]"
set -g window-status-current-format "#[fg=colour252]#[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour252]#[default]"
set -g status-interval 5
set -g status-left "#S"
set -g status-right ""
# for debugging
set -g remain-on-exit "off"

bind r source-file "~/.config/tmux/tmux.conf"
unbind b
bind b switch-client -t vestibule
bind x kill-window
bind-key -n M-BSpace send-keys C-w
bind f run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
bind p run "tmux neww ~/.config/scripts/open-pdf.sh"
bind g run "~/.config/scripts/open-github.sh"
bind t run "tmux neww ~/.config/scripts/time.sh"
bind N run "~/.config/scripts/tmux-session-dispensary.sh ~/documents/notes"
bind P run "~/.config/scripts/tmux-session-dispensary.sh ~/documents/projects"
bind D run "~/.config/scripts/tmux-session-dispensary.sh ~/.config"
bind H run "~/.config/scripts/tmux-session-dispensary.sh ~"
bind l run "~/.config/scripts/tmux-session-dispensary.sh ~/Downloads"
unbind S
bind S run "tmux neww -c '#{pane_current_path}' -n scripts 'bash ~/.config/scripts/script-picker.sh \"#{pane_current_path}\"'"
bind T run "tmux neww -c '#{pane_current_path}' -n typst 'bash ~/.config/scripts/typst-preview-picker.sh \"#{pane_current_path}\"'"
bind G neww -n "git" -S lazygit
bind y neww -n "yazi" -S yazi 
bind O run "tmux neww ~/.config/scripts/links-picker.sh"
bind m run "tmux neww 'bash ~/.config/scripts/mac-mini-services-picker.sh'"
bind k run "tmux neww -n hashcards 'bash ~/.config/scripts/hashcards-picker.sh'"
bind J run "~/.config/scripts/open-audio-journal.sh"
bind W run "tmux neww -n work-mode 'bash ~/.config/scripts/work-mode.sh toggle; printf \"\\nPress enter to close... \"; read -r _'"
bind e neww -S -n "LINKS" "nvim ~/.config/links.tsv"
bind E show-environment -g
